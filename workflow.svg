<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <!-- Background -->
  <rect width="900" height="600" fill="#ffffff"/>
  
  <!-- Title -->
  <text x="450" y="30" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">Solar Tracker Workflow</text>
  
  <!-- BOOT -->
  <rect x="380" y="50" width="120" height="50" rx="8" fill="#a5d8ff" stroke="#000" stroke-width="2"/>
  <text x="440" y="80" font-family="Arial" font-size="18" font-weight="bold" text-anchor="middle">BOOT</text>
  
  <!-- Arrow: BOOT → NORMAL -->
  <line x1="440" y1="100" x2="440" y2="140" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="460" y="125" font-family="Arial" font-size="12">setup()</text>
  
  <!-- NORMAL (AUTO) -->
  <rect x="330" y="150" width="220" height="60" rx="8" fill="#b2f2bb" stroke="#000" stroke-width="2"/>
  <text x="440" y="175" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">NORMAL</text>
  <text x="440" y="195" font-family="Arial" font-size="13" text-anchor="middle">(AUTO tracking)</text>
  
  <!-- Arrow: NORMAL → Centered? -->
  <line x1="440" y1="210" x2="440" y2="250" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Decision: Centered? -->
  <polygon points="440,260 520,300 440,340 360,300" fill="#ffec99" stroke="#000" stroke-width="2"/>
  <text x="440" y="295" font-family="Arial" font-size="13" text-anchor="middle">Centered?</text>
  <text x="440" y="310" font-family="Arial" font-size="11" text-anchor="middle">|diff| &lt; 200</text>
  
  <!-- YES: Centered -->
  <text x="530" y="295" font-family="Arial" font-size="13" fill="#2f9e44" font-weight="bold">YES</text>
  <path d="M 520,300 Q 560,300 560,250 Q 560,180 490,180" fill="none" stroke="#2f9e44" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  <text x="570" y="240" font-family="Arial" font-size="11" fill="#2f9e44">stop, return</text>
  
  <!-- NO: Centered -->
  <text x="440" y="360" font-family="Arial" font-size="13" fill="#e03131" font-weight="bold">NO</text>
  <line x1="440" y1="340" x2="440" y2="380" stroke="#e03131" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  
  <!-- Decision: At limit? -->
  <polygon points="440,390 520,430 440,470 360,430" fill="#ffec99" stroke="#000" stroke-width="2"/>
  <text x="440" y="420" font-family="Arial" font-size="12" text-anchor="middle">At limit + stuck?</text>
  <text x="440" y="435" font-family="Arial" font-size="10" text-anchor="middle">(5 cycles)</text>
  
  <!-- NO: At limit -->
  <text x="440" y="490" font-family="Arial" font-size="13" fill="#2f9e44" font-weight="bold">NO</text>
  <line x1="440" y1="470" x2="440" y2="510" stroke="#2f9e44" stroke-width="2" marker-end="url(#arrowhead-green)"/>
  
  <!-- PULSE -->
  <rect x="350" y="520" width="180" height="50" rx="8" fill="#74c0fc" stroke="#000" stroke-width="2"/>
  <text x="440" y="540" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">PULSE (15ms)</text>
  <text x="440" y="555" font-family="Arial" font-size="11" text-anchor="middle">toward bright side</text>
  
  <!-- Arrow: PULSE → back to NORMAL -->
  <path d="M 350,545 Q 250,545 250,300 Q 250,180 330,180" fill="none" stroke="#000" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="260" y="400" font-family="Arial" font-size="11">next cycle (200ms)</text>
  
  <!-- YES: At limit -->
  <text x="530" y="435" font-family="Arial" font-size="13" fill="#e03131" font-weight="bold">YES</text>
  <line x1="520" y1="430" x2="600" y2="430" stroke="#e03131" stroke-width="2" marker-end="url(#arrowhead-red)"/>
  
  <!-- WRAP MODE -->
  <rect x="620" y="390" width="160" height="80" rx="8" fill="#ff8787" stroke="#000" stroke-width="2"/>
  <text x="700" y="415" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">WRAP MODE</text>
  <text x="700" y="435" font-family="Arial" font-size="11" text-anchor="middle">continuous rotation</text>
  <text x="700" y="450" font-family="Arial" font-size="11" text-anchor="middle">to opposite limit</text>
  
  <!-- Arrow: WRAP → ESCAPE -->
  <line x1="700" y1="390" x2="700" y2="330" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- ESCAPE -->
  <rect x="640" y="270" width="120" height="50" rx="8" fill="#ffa94d" stroke="#000" stroke-width="2"/>
  <text x="700" y="290" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">ESCAPE</text>
  <text x="700" y="305" font-family="Arial" font-size="11" text-anchor="middle">(5 pulses)</text>
  
  <!-- Arrow: ESCAPE → NORMAL -->
  <line x1="640" y1="295" x2="550" y2="180" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="620" y="220" font-family="Arial" font-size="11">back to NORMAL</text>
  
  <!-- MANUAL MODE -->
  <rect x="80" y="150" width="140" height="50" rx="8" fill="#e599f7" stroke="#000" stroke-width="2"/>
  <text x="150" y="180" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle">MANUAL</text>
  
  <!-- MENU -->
  <rect x="80" y="50" width="140" height="60" rx="8" fill="#d0bfff" stroke="#000" stroke-width="2"/>
  <text x="150" y="75" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">MENU</text>
  <text x="150" y="92" font-family="Arial" font-size="10" text-anchor="middle">Auto / Manual / Sleep</text>
  
  <!-- Arrows: MENU ↔ MANUAL -->
  <line x1="150" y1="110" x2="150" y2="150" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="150" y1="150" x2="150" y2="110" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)" transform="translate(0, -40)"/>
  <text x="165" y="135" font-family="Arial" font-size="10">SELECT</text>
  
  <!-- SLEEP -->
  <rect x="80" y="250" width="140" height="50" rx="8" fill="#868e96" stroke="#000" stroke-width="2"/>
  <text x="150" y="280" font-family="Arial" font-size="16" font-weight="bold" text-anchor="middle" fill="#fff">SLEEP</text>
  
  <!-- Arrow: MENU → SLEEP -->
  <line x1="150" y1="200" x2="150" y2="250" stroke="#000" stroke-width="2" marker-end="url(#arrowhead)"/>
  
  <!-- Note box -->
  <rect x="620" y="520" width="260" height="70" rx="5" fill="#f8f9fa" stroke="#868e96" stroke-width="1"/>
  <text x="630" y="540" font-family="Arial" font-size="11" font-weight="bold">NOTE:</text>
  <text x="630" y="555" font-family="Arial" font-size="10">Servo pulses every 200ms (LDR interval)</text>
  <text x="630" y="570" font-family="Arial" font-size="10">Pulse = 15ms movement. Stop timer handles brake.</text>
  <text x="630" y="582" font-family="Arial" font-size="10">Limiters debounced: 3 consecutive LOW reads.</text>
  
  <!-- Legend -->
  <text x="50" y="400" font-family="Arial" font-size="12" fill="#2f9e44" font-weight="bold">GREEN = YES / continue</text>
  <text x="50" y="420" font-family="Arial" font-size="12" fill="#e03131" font-weight="bold">RED = NO / trigger wrap</text>
  
  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2f9e44"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e03131"/>
    </marker>
  </defs>
</svg>
